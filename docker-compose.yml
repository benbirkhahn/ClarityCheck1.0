version: '3.8'

services:
  # 1. The Message Broker (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. The API Server
  web:
    build: .
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend # Live code reloading
      - ./uploads:/app/uploads # Shared storage
      - ./clarity.db:/app/clarity.db # Persist DB file
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

  # 3. The Background Worker
  worker:
    build: .
    command: celery -A backend.core.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend # Live code reloading
      - ./uploads:/app/uploads # Shared storage (Crucial!)
      - ./clarity.db:/app/clarity.db # Persist DB file
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web

  # 4. The Frontend UI
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - web
