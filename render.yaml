services:
  # 1. The API Web Service
  - type: web
    name: clarity-api
    runtime: docker
    plan: free
    region: oregon 

    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://clarity-frontend-038g.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: clarity-db
          property: connectionString

      - key: PROJECT_NAME
        value: ClarityCheck Production




  # 4. The Frontend (Static Site)
  - type: web
    name: clarity-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: clarity-api
          envVarKey: RENDER_EXTERNAL_URL

  # 5. Landing Page (Static Site — no build needed)
  - type: web
    name: clarity-landing
    runtime: static
    branch: main
    rootDir: landing
    buildCommand: echo "No build needed"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html

databases:
  # 5. Managed Postgres
  - name: clarity-db
    databaseName: clarity
    user: clarity_user
    plan: free
    region: oregon
