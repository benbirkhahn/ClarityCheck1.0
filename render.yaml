services:
  # 1. The API Web Service
  - type: web
    name: clarity-api
    runtime: docker
    plan: free
    region: oregon 
    dockerCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clarity-db
          property: connectionString

      - key: PROJECT_NAME
        value: ClarityCheck Production
      - key: CORS_ORIGINS
        value: https://clarity-frontend.onrender.com # We will need to update this after frontend deploy!



  # 4. The Frontend (Static Site)
  - type: web
    name: clarity-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: clarity-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # 5. Managed Postgres
  - name: clarity-db
    databaseName: clarity
    user: clarity_user
    plan: free
    region: oregon
